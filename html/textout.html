<html>

<head>
  <meta charset="UTF-8" />
  <title>Li2424 - Info</title>
  <link rel="stylesheet" href="../res/general_style.css" />
  <meta name="author" content="Li2424">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
  <noscript>
    <div class="js_inactive">Bitte aktiviere Javaskript in deinem Browser!</div>
  </noscript>
  <div class="web-body-001">
    <h1 id="t"></h1>
    <div class="info-01"><img src="../img/info.png"></img>
      <p class="content" id="msg">...</p>
    </div>
    <p>Information auf Li2424's Webseite</p>
  </div>
</body>
<script>
  const msgobj = document.querySelector('#msg');
  const titleobj = document.querySelector('#t');
  msgobj.innerText = param('msg');
  var title = param('title');
  if (title == null) {
    title = "Information";
  }
  titleobj.innerText = title;
  function param(name) {
    return new URL(window.location.href).searchParams.get(name);
  }
</script>

</html>
